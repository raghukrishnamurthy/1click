---
- name: Claim Standalone Cisco UCS Server to Intersight PVA
  hosts: Cisco_CSeries_servers
  connection: local
  gather_facts: false

  tasks:
    - name: Display server information before claiming
      debug:
        msg:
          - "Server CIMC IP: {{ server_cimc_ip }}"
          - "Server CIMC Username: {{ server_cimc_username }}"
          - "Intersight PVA IP: {{ intersight_pva_ip }}"
          - "API Key ID: {{ api_key }}"
          - "API Private Key Path: {{ api_private_key_path }}"

    - name: Claim the target using /api/v1/asset/DeviceClaims endpoint
      cisco.intersight.intersight_rest_api:
        # Intersight API Authentication details
        api_key_id: "{{ api_key }}"
        api_private_key: "{{ lookup('ansible.builtin.file', '{{ api_private_key_path }}') }}"
        # For Intersight PVA, provide the appliance IP as the API endpoint
        api_uri: "https://{{ intersight_pva_ip }}"
        validate_certs: false
        update_method: post
        resource_path: "/api/v1/appliance/DeviceClaims"
        # Target details for claiming
        api_body:
          Username: "{{ server_cimc_username }}"
          Password: "{{ server_cimc_password }}"
          Hostname: "{{ server_cimc_ip }}"
          PlatformType: "IMC"
      register: claim_result
      ignore_errors: yes

   
    - name: Display claim result
      debug:
        msg:
          - "Claim Status: {{ claim_result.changed | default('Unknown') }}"
          - "Server {{ server_cimc_ip }} has been claimed to Intersight PVA at {{ intersight_pva_ip }}"
      when: claim_result.changed is defined and claim_result.changed

    - name: Display claim failure
      debug:
        msg:
          - "Failed to claim server {{ server_cimc_ip }}"
          - "Error: {{ claim_result.msg | default('Unknown error') }}"
      when: claim_result.failed is defined and claim_result.failed


    - name: Wait and Validate Claim Status via Workflow API
      cisco.intersight.intersight_rest_api:
        api_key_id: "{{ api_key }}"
        api_private_key: "{{ lookup('ansible.builtin.file', api_private_key_path) }}"
        api_uri: "https://{{ intersight_pva_ip }}"
        validate_certs: false
        resource_path: "/api/v1/workflow/WorkflowInfos"
        query_params:
          $filter: "Name eq 'Device registration request' and WorkflowCtx/InitiatorCtx/InitiatorName eq '{{ server_cimc_ip }}' and Status eq 'COMPLETED'"
          $top: 1
      register: workflow_check
      # Retry for up to 2 minutes (12 * 10s) to allow the workflow to appear and process
      until: "workflow_check.api_response | length > 0"
      retries: 120
      delay: 15
    - name: Print the entire returned JSON dictionary
      ansible.builtin.debug:
        var: workflow_check.api_response  