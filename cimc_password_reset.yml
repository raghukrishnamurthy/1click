---
- name: Redfish Password Reset Playbook
  hosts: Cisco_CSeries_servers
  gather_facts: false
  connection: local
  vars:
    redfish_account_uri: "/redfish/v1/AccountService/Accounts/1"
    redfish_accounts_uri: "/redfish/v1/AccountService/Accounts/"

  tasks:
    - name: Check if the server is in password reset mode
      uri:
        url: "https://{{ server_ip }}{{ redfish_accounts_uri }}"
        method: GET
        user: "{{ user }}"
        password: "{{ default_password }}"
        force_basic_auth: yes
        validate_certs: false
        return_content: true
      register: redfish_account_info
      ignore_errors: yes

    - name: Debug - Show complete response
      debug:
        var: redfish_account_info

    - name: Debug - Show the actual PasswordChangeRequired value from API
      debug:
        msg:
          - "Raw value from API: '{{ redfish_account_info.json.PasswordChangeRequired }}'"
          - "Value type: {{ redfish_account_info.json.PasswordChangeRequired | type_debug }}"
          - "Status code: {{ redfish_account_info.status }}"
      when: 
        - redfish_account_info.json is defined
        - redfish_account_info.json.PasswordChangeRequired is defined

    - name: Set fact if password change is required
      set_fact:
        password_change_required: "{{ redfish_account_info.json.PasswordChangeRequired | bool }}"
      when:
        - redfish_account_info.status is defined
        - redfish_account_info.status == 200
        - redfish_account_info.json is defined
        - redfish_account_info.json.PasswordChangeRequired is defined

    - name: Set fact to false if unable to determine
      set_fact:
        password_change_required: true
      when: password_change_required is not defined

    - name: Debug - Show if password change is required
      debug:
        msg: "Password change required: {{ password_change_required }}"

    - name: Change the password using PATCH if required
      when: password_change_required | bool
      uri:
        url: "https://{{ server_ip }}{{ redfish_account_uri }}"
        method: PATCH
        user: "{{ user }}"
        password: "{{ default_password }}"
        force_basic_auth: yes
        validate_certs: false
        headers:
          Content-Type: "application/json"
        body_format: json
        body:
          Password: "{{ new_password }}"
      register: password_reset_response

    - name: Debug - Show result of password reset
      when: password_change_required | bool
      debug:
        var: password_reset_response